<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>NR-1 Map | Sistema Integrado</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
/* Estilos Base Estáveis */
:root { --roxo:#7B00C4; --verde:#0A6E4F; --preto:#0D1210; --cinza:#f4f7f6; }
body { margin:0; font-family:'Inter',sans-serif; background:var(--cinza); height:100vh; }
.login-screen { display:flex; height:100vh; align-items:center; justify-content:center; background:var(--preto); color:#fff; }
.app-container { display:none; height:100vh; }
.main-view { display:none; }
.main-view.active { display:block; }
</style>
</head>
<body>

<!-- TELA DE LOGIN RESTAURADA -->
<div id="login-screen" class="login-screen">
    <div style="width:400px; padding:40px; background:#1a1f1d; border-radius:15px;">
        <h2>NR-1 Map</h2>
        <div id="login-tabs">
            <button onclick="acessar('admin')">Admin</button>
            <button onclick="acessar('parceiro')">Parceiro</button>
            <button onclick="acessar('rh')">RH</button>
        </div>
    </div>
</div>

<!-- CONTAINER DO SISTEMA -->
<div id="app-container" class="app-container" style="display:flex;">
    <aside style="width:240px; background:var(--preto); color:#fff; padding:20px;">
        <h2 style="font-family:'Syne'">NR-1 Map</h2>
        <div onclick="sv('dashboard')" style="cursor:pointer; margin:15px 0;">📊 Dashboard</div>
        <div onclick="sv('clientes')" style="cursor:pointer; margin:15px 0;">🏢 Clientes</div>
        <div onclick="sv('perguntas')" style="cursor:pointer; margin:15px 0;">🧩 Perguntas (110)</div>
        <button onclick="location.reload()" style="margin-top:50px;">← Voltar ao Login</button>
    </aside>

    <main id="main" style="flex:1; padding:20px;">
        <!-- Dashboard com Velocímetros -->
        <div id="view-dashboard" class="main-view active">
            <h1>Dashboard</h1>
            <div style="display:flex; gap:20px;">
                <div class="card">Fisiológicos (Velocímetro aqui)</div>
                <div class="card">Segurança (Velocímetro aqui)</div>
            </div>
        </div>
        
        <!-- Outras telas seguem a lógica show/hide -->
    </main>
</div>

<script>
function acessar(perfil) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
}
function sv(id) {
    document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
}
</script>
</body>
</html>
